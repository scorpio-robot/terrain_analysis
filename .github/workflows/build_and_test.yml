name: Build
on:
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Add LLVM APT repository
        uses: gerlero/add-apt-repository@v1
        with:
          uri: https://apt.llvm.org/noble/
          suite: llvm-toolchain-noble-21
          key: https://apt.llvm.org/llvm-snapshot.gpg.key

      - name: Install clang-format and clang-tidy
        uses: gerlero/apt-install@v1
        with:
          packages: clang-format-21 clang-tidy-21

      - name: Build and run tests
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: terrain_analysis
          target-ros2-distro: jazzy
